<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N&#x014D;va</title>
  <meta name="description" content="Your minimal workspace — notes, images, and tasks." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/global.css" />

  <!-- App -->
  <script type="module" src="src/app.js"></script>
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <img src="assets/icon-512.png" alt="N&#x014D;va" class="auth-logo-img" />
      <div class="auth-logo">N&#x014D;va</div>
      <p class="auth-subtitle">Tu workspace m&iacute;nimo</p>
      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="auth-password" placeholder="Contrase&ntilde;a" required autocomplete="current-password" />
        <button type="submit" id="auth-submit" class="btn btn-primary">Iniciar sesi&oacute;n</button>
      </form>

    </div>
  </div>

  <!-- Main App Shell -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <!-- Logo -->
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <img src="assets/favicon.png" alt="" class="sidebar-logo-img" />
          <span class="sidebar-logo">N&#x014D;va</span>
        </div>
        <div class="sidebar-header-actions">
          <span id="sync-dot" class="sync-dot" title="Sincronizado"></span>
          <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        </div>
      </div>

      <!-- Categories -->
      <nav class="sidebar-categories">
        <button class="category-btn active" data-category="notes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span>Notas</span>
        </button>
        <button class="category-btn" data-category="images">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Im&aacute;genes</span>
        </button>
        <button class="category-btn" data-category="todo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>To-do</span>
        </button>
      </nav>

      <!-- Divider -->
      <div class="sidebar-divider"></div>

      <!-- Instances List -->
      <div class="sidebar-instances-header">
        <span id="instances-title">Notas</span>
        <button id="btn-new-instance" class="btn-icon" title="Nueva instancia">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="instances-list" class="sidebar-instances">
        <!-- Instances rendered dynamically -->
      </div>

      <!-- User / Logout -->
      <div class="sidebar-footer">
        <span id="user-email" class="user-email"></span>
        <button id="btn-logout" class="btn-icon" title="Cerrar sesi&oacute;n">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Views rendered dynamically -->
      <div id="view-empty" class="view-empty">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--icon-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p>Seleccion&aacute; o cre&aacute; una instancia para empezar</p>
        </div>
      </div>

      <div id="view-notes" class="view-panel hidden"></div>
      <div id="view-images" class="view-panel hidden"></div>
      <div id="view-todo" class="view-panel hidden"></div>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- FAB links -->
    <div class="fab-container">
      <div class="fab-menu" id="fab-menu">
        <a href="https://github.com/MozzVader/Nova" target="_blank" rel="noopener" class="fab-link" title="Repo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.806 1.304 3.492.997.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.694.825.576C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
        </a>
        <a href="https://www.mozzdev.com" target="_blank" rel="noopener" class="fab-link" title="Portfolio">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
      </div>
      <button id="fab-toggle" class="fab-toggle" title="Links">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </div>
  </div>
</body>
</html>
